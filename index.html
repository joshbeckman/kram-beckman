<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kram-Beckman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf9f7;
            color: #2c2c2c;
            padding: 2rem;
        }

        main {
            max-width: 420px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            margin-bottom: 2.5rem;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        li {
            border-left: 3px solid #d4d0ca;
            padding-left: 1rem;
        }
        li:first-child {
            border-color: #bd2024;
        }
        li:nth-child(2) {
            border-color: #002FA7;
        }
        li:nth-child(3) {
            border-color: #FFCC00;
        }
        li:nth-child(4) {
            border-color: #FF7900;
        }
        li:nth-child(5) {
            border-color: #151515;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .name a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid #d4d0ca;
        }

        .name a:hover {
            border-bottom-color: #2c2c2c;
        }

        .email {
            font-size: 0.9rem;
            color: #6b6b6b;
            margin-top: 0.25rem;
        }

        .email a {
            color: inherit;
            text-decoration: none;
        }

        .email a:hover {
            text-decoration: underline;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #e0e0e0;
            }
            li {
                border-color: #4a4a4a;
            }
            li:nth-child(5) {
                border-color: #e0e0e0;
            }
            .name a {
                border-bottom-color: #4a4a4a;
            }
            .name a:hover {
                border-bottom-color: #e0e0e0;
            }
            .email {
                color: #999;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Kram-Beckman</h1>
        <ul>
            <li>
                <div class="name"><a href="https://www.joshbeckman.org">Josh Beckman</a></div>
                <div class="email"><a href="mailto:josh@kram-beckman.com">josh@kram-beckman.com</a></div>
            </li>
            <li>
                <div class="name"><a href="https://www.marybethkram.com">Marybeth Kram</a></div>
                <div class="email"><a href="mailto:marybeth@kram-beckman.com">marybeth@kram-beckman.com</a></div>
            </li>
            <li>
                <div class="name">Aria Kram-Beckman</div>
                <div class="email"><a href="mailto:aria@kram-beckman.com">aria@kram-beckman.com</a></div>
            </li>
            <li>
                <div class="name">Fox Kram-Beckman</div>
                <div class="email">figuring it out</div>
            </li>
            <li>
                <div class="name"><a href="https://bant.kram-beckman.com">Bant Kram-Beckman</a></div>
                <div class="email">2011 - 2026</div>
            </li>
        </ul>
    </main>
    <script>
    (function() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var colors = ['#bd2024', '#002FA7', '#FFCC00', '#FF7900', isDark ? '#e0e0e0' : '#151515'];
        var items = document.querySelectorAll('li');
        var ul = document.querySelector('ul');
        var main = document.querySelector('main');

        // Hide items initially
        items.forEach(function(li) {
            li.style.borderColor = 'transparent';
            li.style.opacity = '0';
        });

        // Create floating bar elements
        var bars = [];
        var circleRadius = 30;
        var barHeight = 40;
        var mainRect = main.getBoundingClientRect();
        var h1 = document.querySelector('h1');
        var h1Rect = h1.getBoundingClientRect();
        var range = document.createRange();
        range.selectNodeContents(h1);
        var textRect = range.getBoundingClientRect();
        var cx = textRect.left + (textRect.width / 2) - mainRect.left;
        var cy = h1Rect.bottom + 40 - mainRect.top;

        main.style.position = 'relative';

        colors.forEach(function(color, i) {
            var bar = document.createElement('div');
            bar.style.position = 'absolute';
            bar.style.width = '3px';
            bar.style.height = barHeight + 'px';
            bar.style.background = color;
            bar.style.borderRadius = '1.5px';
            bar.style.transformOrigin = 'center center';
            bar.style.transition = 'none';
            bar.style.zIndex = '10';
            main.appendChild(bar);
            bars.push(bar);
        });

        // Animate spinning in a circle
        var startTime = performance.now();
        var spinDuration = 1800;
        var settling = false;

        var barAngles = [];

        function positionInCircle(time) {
            var elapsed = time - startTime;
            var angle = (elapsed / spinDuration) * Math.PI * 4; // 2 full rotations
            bars.forEach(function(bar, i) {
                var a = angle + (i * 2 * Math.PI / bars.length);
                var x = cx + Math.cos(a) * circleRadius;
                var y = cy + Math.sin(a) * circleRadius;
                bar.style.left = x + 'px';
                bar.style.top = y + 'px';
                var rot = a + Math.PI / 2;
                bar.style.transform = 'rotate(' + rot + 'rad)';
                barAngles[i] = rot;
            });
        }

        function spinLoop(time) {
            if (settling) return;
            positionInCircle(time);
            if (time - startTime < spinDuration) {
                requestAnimationFrame(spinLoop);
            } else {
                unfurl();
            }
        }

        function unfurl() {
            settling = true;
            bars.forEach(function(bar, i) {
                var li = items[i];
                var liRect = li.getBoundingClientRect();
                var mainRect = main.getBoundingClientRect();
                var targetX = liRect.left - mainRect.left;
                var targetY = liRect.top - mainRect.top;
                var targetH = liRect.height;

                // Find nearest multiple of 2π to current angle so rotation to it is minimal
                var cur = barAngles[i] || 0;
                var twoPi = Math.PI * 2;
                var target = Math.round(cur / twoPi) * twoPi;

                bar.style.borderRadius = '0';
                bar.style.transition = 'left 0.6s cubic-bezier(0.23, 1, 0.32, 1), top 0.6s cubic-bezier(0.23, 1, 0.32, 1), height 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                bar.style.transitionDelay = (i * 0.07) + 's';

                requestAnimationFrame(function() {
                    bar.style.left = targetX + 'px';
                    bar.style.top = targetY + 'px';
                    bar.style.height = targetH + 'px';
                    bar.style.transform = 'rotate(' + target + 'rad)';
                });
            });

            // Fade in text and swap to real borders
            setTimeout(function() {
                items.forEach(function(li, i) {
                    li.style.transition = 'opacity 0.4s ease';
                    li.style.opacity = '1';
                });
                setTimeout(function() {
                    items.forEach(function(li, i) {
                        li.style.borderColor = '';
                        li.style.transition = '';
                    });
                    bars.forEach(function(bar) { bar.remove(); });
                }, 500);
            }, 600 + (bars.length * 70));
        }

        requestAnimationFrame(spinLoop);
    })();
    </script>
</body>
</html>
